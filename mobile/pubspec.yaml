name: taskflow_mobile
description: TaskFlow - Task Management Mobile App (Track B)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.4
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Dependency Injection
  get_it: ^7.6.7

  # Functional Programming
  dartz: ^0.10.1

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
